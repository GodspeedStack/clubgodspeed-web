<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Security Audit - Godspeed Basketball</title>
 <link rel="stylesheet" href="styles.css">
 <style>
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: #f5f5f7;
 padding: 20px;
 }
 .audit-container {
 max-width: 1200px;
 margin: 0 auto;
 }
 .audit-header {
 background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
 color: white;
 padding: 30px;
 border-radius: 12px 12px 0 0;
 margin-bottom: 0;
 }
 .audit-header h1 {
 margin: 0;
 font-size: 28px;
 }
 .audit-content {
 background: white;
 padding: 30px;
 border-radius: 0 0 12px 12px;
 box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
 }
 .filter-section {
 display: flex;
 gap: 15px;
 margin-bottom: 30px;
 flex-wrap: wrap;
 }
 .filter-group {
 flex: 1;
 min-width: 200px;
 }
 .filter-group label {
 display: block;
 margin-bottom: 5px;
 color: #374151;
 font-weight: 600;
 font-size: 14px;
 }
 .filter-group select,
 .filter-group input {
 width: 100%;
 padding: 10px;
 border: 2px solid #e5e7eb;
 border-radius: 8px;
 font-size: 14px;
 }
 .btn {
 padding: 10px 20px;
 border: none;
 border-radius: 8px;
 font-weight: 600;
 cursor: pointer;
 font-size: 14px;
 }
 .btn-primary {
 background: #2563eb;
 color: white;
 }
 .btn-primary:hover {
 background: #1d4ed8;
 }
 .btn-secondary {
 background: #6b7280;
 color: white;
 }
 .logs-table {
 width: 100%;
 border-collapse: collapse;
 margin-top: 20px;
 }
 .logs-table th {
 background: #f9fafb;
 padding: 12px;
 text-align: left;
 font-weight: 600;
 color: #374151;
 border-bottom: 2px solid #e5e7eb;
 }
 .logs-table td {
 padding: 12px;
 border-bottom: 1px solid #e5e7eb;
 font-size: 14px;
 }
 .logs-table tr:hover {
 background: #f9fafb;
 }
 .log-level {
 padding: 4px 8px;
 border-radius: 4px;
 font-weight: 600;
 font-size: 12px;
 text-transform: uppercase;
 }
 .log-level.error {
 background: #fee2e2;
 color: #dc2626;
 }
 .log-level.warn {
 background: #fef3c7;
 color: #d97706;
 }
 .log-level.info {
 background: #dbeafe;
 color: #2563eb;
 }
 .log-level.debug {
 background: #f3f4f6;
 color: #6b7280;
 }
 .security-issues {
 background: #fef2f2;
 border: 2px solid #fecaca;
 border-radius: 8px;
 padding: 20px;
 margin-bottom: 30px;
 }
 .security-issues h2 {
 color: #dc2626;
 margin: 0 0 15px 0;
 }
 .issue-item {
 padding: 10px;
 margin: 10px 0;
 background: white;
 border-radius: 6px;
 border-left: 4px solid #dc2626;
 }
 .issue-item.high {
 border-left-color: #dc2626;
 }
 .issue-item.medium {
 border-left-color: #f59e0b;
 }
 .issue-item.low {
 border-left-color: #3b82f6;
 }
 .stats-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
 gap: 20px;
 margin-bottom: 30px;
 }
 .stat-card {
 background: #f9fafb;
 padding: 20px;
 border-radius: 8px;
 text-align: center;
 }
 .stat-card h3 {
 margin: 0 0 10px 0;
 color: #6b7280;
 font-size: 14px;
 text-transform: uppercase;
 }
 .stat-card .value {
 font-size: 32px;
 font-weight: 700;
 color: #111827;
 }
 </style>
</head>
<body>
 <div class="audit-container">
 <div class="audit-header">
 <h1>Security Audit Dashboard</h1>
 <p style="margin: 10px 0 0 0; opacity: 0.9;">Monitor security events and vulnerabilities</p>
 </div>
 <div class="audit-content">
 <div id="security-issues-container"></div>
 <div class="stats-grid" id="stats-grid"></div>

 <div class="filter-section">
 <div class="filter-group">
 <label>Log Level</label>
 <select id="level-filter">
 <option value="">All Levels</option>
 <option value="error">Error</option>
 <option value="warn">Warning</option>
 <option value="info">Info</option>
 <option value="debug">Debug</option>
 </select>
 </div>
 <div class="filter-group">
 <label>Event Type</label>
 <select id="event-filter">
 <option value="">All Events</option>
 <option value="login">Login</option>
 <option value="2fa">2FA</option>
 <option value="rate_limit">Rate Limit</option>
 <option value="email_verification">Email Verification</option>
 </select>
 </div>
 <div class="filter-group">
 <label>Since</label>
 <input type="date" id="date-filter">
 </div>
 <div class="filter-group" style="display: flex; align-items: flex-end;">
 <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
 </div>
 </div>

 <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
 <h2 style="margin: 0;">Audit Logs</h2>
 <div>
 <button class="btn btn-secondary" onclick="exportLogs()">Export Logs</button>
 <button class="btn btn-secondary" onclick="clearLogs()" style="margin-left: 10px;">Clear Logs</button>
 </div>
 </div>

 <table class="logs-table">
 <thead>
 <tr>
 <th>Timestamp</th>
 <th>Level</th>
 <th>Event</th>
 <th>Details</th>
 <th>URL</th>
 </tr>
 </thead>
 <tbody id="logs-tbody">
 <tr>
 <td colspan="5" style="text-align: center; padding: 40px; color: #6b7280;">
 Loading logs...
 </td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>

 <script src="security.js"></script>
 <script>
 function loadLogs() {
 if (!window.Security || !window.Security.SecurityAudit) {
 document.getElementById('logs-tbody').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #dc2626;">Security system not loaded</td></tr>';
 return;
 }

 const levelFilter = document.getElementById('level-filter').value;
 const eventFilter = document.getElementById('event-filter').value;
 const dateFilter = document.getElementById('date-filter').value;

 const filter = {};
 if (levelFilter) filter.level = levelFilter;
 if (eventFilter) filter.event = eventFilter;
 if (dateFilter) filter.since = dateFilter;

 const logs = window.Security.SecurityAudit.getLogs(filter);
 displayLogs(logs);
 updateStats(logs);
 }

 function displayLogs(logs) {
 const tbody = document.getElementById('logs-tbody');
 if (logs.length === 0) {
 tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #6b7280;">No logs found</td></tr>';
 return;
 }

 tbody.innerHTML = logs.reverse().map(log => {
 const timestamp = new Date(log.timestamp).toLocaleString();
 const details = JSON.stringify(log.details, null, 2);
 const url = log.url || 'N/A';
 return `
 <tr>
 <td>${timestamp}</td>
 <td><span class="log-level ${log.level}">${log.level}</span></td>
 <td>${log.event}</td>
 <td><pre style="margin: 0; font-size: 12px; max-width: 400px; overflow: auto;">${details}</pre></td>
 <td style="font-size: 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis;">${url}</td>
 </tr>
 `;
 }).join('');
 }

 function updateStats(logs) {
 const stats = {
 total: logs.length,
 errors: logs.filter(l => l.level === 'error').length,
 warnings: logs.filter(l => l.level === 'warn').length,
 logins: logs.filter(l => l.event.includes('login')).length
 };

 document.getElementById('stats-grid').innerHTML = `
 <div class="stat-card">
 <h3>Total Events</h3>
 <div class="value">${stats.total}</div>
 </div>
 <div class="stat-card">
 <h3>Errors</h3>
 <div class="value" style="color: #dc2626;">${stats.errors}</div>
 </div>
 <div class="stat-card">
 <h3>Warnings</h3>
 <div class="value" style="color: #d97706;">${stats.warnings}</div>
 </div>
 <div class="stat-card">
 <h3>Login Events</h3>
 <div class="value" style="color: #2563eb;">${stats.logins}</div>
 </div>
 `;
 }

 function runSecurityCheck() {
 if (!window.Security || !window.Security.SecurityAudit) {
 return;
 }

 const issues = window.Security.SecurityAudit.runSecurityCheck();
 const container = document.getElementById('security-issues-container');

 if (issues.length === 0) {
 container.innerHTML = '';
 return;
 }

 container.innerHTML = `
 <div class="security-issues">
 <h2>⚠️ Security Issues Detected</h2>
 ${issues.map(issue => `
 <div class="issue-item ${issue.severity}">
 <strong>${issue.severity.toUpperCase()}</strong>: ${issue.message}
 <br><small>Type: ${issue.type}</small>
 </div>
 `).join('')}
 </div>
 `;
 }

 function applyFilters() {
 loadLogs();
 }

 function exportLogs() {
 if (!window.Security || !window.Security.SecurityAudit) {
 alert('Security system not available');
 return;
 }

 const logs = window.Security.SecurityAudit.getLogs({});
 const dataStr = JSON.stringify(logs, null, 2);
 const dataBlob = new Blob([dataStr], { type: 'application/json' });
 const url = URL.createObjectURL(dataBlob);
 const link = document.createElement('a');
 link.href = url;
 link.download = `security-audit-${new Date().toISOString().split('T')[0]}.json`;
 link.click();
 URL.revokeObjectURL(url);
 }

 function clearLogs() {
 if (confirm('Are you sure you want to clear all audit logs? This action cannot be undone.')) {
 if (window.Security && window.Security.SecurityAudit) {
 window.Security.SecurityAudit.clearLogs();
 loadLogs();
 }
 }
 }

 // Set default date to 7 days ago
 const dateInput = document.getElementById('date-filter');
 const weekAgo = new Date();
 weekAgo.setDate(weekAgo.getDate() - 7);
 dateInput.value = weekAgo.toISOString().split('T')[0];

 // Load logs on page load
 loadLogs();
 runSecurityCheck();

 // Auto-refresh every 30 seconds
 setInterval(() => {
 loadLogs();
 runSecurityCheck();
 }, 30000);
 </script>
</body>
</html>
