 ]

 const MONTH_NAMES = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

 function getEventsForDate(date) {
 const dateStr = date.toISOString().split('T')[0];
 const dayOfWeek = date.getDay(); // 0=Sun, 1=Mon...

 let events = [];

 // 1. External Events (Injected)
 const daysExternal = externalEvents.filter(e => e.date === dateStr);
 if (daysExternal.length > 0) {
 events = events.concat(daysExternal);
 }

 // 2. Check Specific Overrides first
 if (SPECIFIC_EVENTS[dateStr] === 'SKIP') return [];

 if (SPECIFIC_EVENTS[dateStr] && Array.isArray(SPECIFIC_EVENTS[dateStr])) {
 SPECIFIC_EVENTS[dateStr].forEach(ev => {
 if (ev.recurring) {
 // Include recurring
 const recurring = RECURRING_EVENTS[dayOfWeek];
 if (recurring) {
 if (!recurring.startDate || date >= new Date(recurring.startDate)) {
 events.push(recurring);
 }
 }
 } else {
 events.push(ev);
 }
 });
 // Logic above allows mixing specific + recurring if specific array has {recurring:true}
 if (!SPECIFIC_EVENTS[dateStr].some(e => e.recurring) && events.length > 0) {
 return filterEventsByEnrollment(events);
 }
 }

 // Fallback to Recurring
 if (RECURRING_EVENTS[dayOfWeek]) {
 const recurring = RECURRING_EVENTS[dayOfWeek];
 // Check if recurring event has a start date requirement
 if (!recurring.startDate || date >= new Date(recurring.startDate)) {
 events.push(recurring);
 }
 }

 return filterEventsByEnrollment(events);
 }

 /**
 * Filter events based on athlete's enrolled programs
 * If enrolledPrograms is empty, show all events
 */
 function filterEventsByEnrollment(events) {
 // If no filter is set, show all events
 if (!filterAthleteId && enrolledPrograms.length === 0) {
 return events;
 }

 // If filter is set but no enrolled programs, show nothing
 if (filterAthleteId && enrolledPrograms.length === 0) {
 return [];
 }

 // Filter events based on program type matching enrolled programs
 return events.filter(event => {
 // Map event types to program IDs
 const eventTypeToProgram = {
 'skills': 'skills-program',
 'mandatory-skills': 'skills-program',
 'team-practice': 'team-practice',
 'practice': 'team-practice'
 };

 const programId = eventTypeToProgram[event.type];

 // If event type doesn't map to a program, show it (e.g., games)
 if (!programId) return true;

 // Check if athlete is enrolled in this program type
 return enrolledPrograms.some(ep =>
 ep.includes(programId) ||
 ep.includes(event.type) ||
 ep === programId
 );
 });
 }

 function renderCalendar() {
 const year = currentDate.getFullYear();
 const month = currentDate.getMonth();
 const isMobile = window.innerWidth < 768;

 // Update Header
 document.getElementById('monthTitle').innerText = MONTH_NAMES[month];
 document.getElementById('yearSubtitle').innerText = `${year} Schedule`;

 const grid = document.getElementById('calendarGridBody');
 const listContainer = document.getElementById('calendarListBody');

 // Stats Calculation (Season Total)
 const stats = calculateSeasonStats(year, month);
 document.getElementById('calculated-hours').innerHTML = `
 <span style="background: rgba(37,99,235,0.1); color: #2563eb; padding: 4px 10px; border-radius: 99px;">${stats.practice} Practice Hours</span>
 <span style="background: rgba(0,0,0,0.05); color: #1d1d1f; padding: 4px 10px; border-radius: 99px;">${stats.game} Game Hours</span>
 `;

 // Mobile: Render as list
 if (isMobile && listContainer) {
 renderCalendarList(year, month, listContainer);
 document.querySelector('.calendar-grid').style.display = 'none';
 document.querySelector('.calendar-list-view').style.display = 'block';
 return;
 }

 // Desktop: Render as grid
 if (listContainer) {
 document.querySelector('.calendar-list-view').style.display = 'none';
 }
 document.querySelector('.calendar-grid').style.display = 'grid';
 grid.innerHTML = ''; // Clear

 // Days Generation
 const firstDay = new Date(year, month, 1);
 const lastDay = new Date(year, month + 1, 0);

 // Pad start
 let startPadding = firstDay.getDay(); // 0 is Sunday
 // If we want consistent rows, we just fill empty divs
 for (let i = 0; i < startPadding; i++) {
 const pad = document.createElement('div');
 pad.className = 'calendar-day';
 grid.appendChild(pad);
 }

 // Days
 for (let i = 1; i <= lastDay.getDate(); i++) {
 const cell = document.createElement('div');
 cell.className = 'calendar-day';

 const currentDayDate = new Date(year, month, i);
 const isToday = (currentDayDate.toDateString() === new Date().toDateString());

 // Day Number
 const numSpan = document.createElement('span');
 numSpan.className = `day-number ${isToday ? 'today' : ''}`;
 numSpan.innerText = i;
 cell.appendChild(numSpan);

 // Events
 const events = getEventsForDate(currentDayDate);
 events.forEach(ev => {
 const pill = document.createElement('span');
 if (ev.style) {
 pill.className = ev.pillClass;
 pill.style = ev.style;
 pill.innerText = ev.title;
 } else {
 pill.className = `event-pill ${ev.pillClass}`;
 pill.innerText = ev.title;
 // Onclick
 pill.onclick = () => openEvent(
 ev.fullTitle || ev.title,
 ev.desc ? 'Event' : 'Info',
 ev.time || 'All Day',
 ev.loc || 'TBD',
 ev.desc || '',
 ev.color,
 ev.textColor
 );
 }
 cell.appendChild(pill);
 });

 grid.appendChild(cell);
 }
 }

 function renderCalendarList(year, month, container) {
 container.innerHTML = '';
 const lastDay = new Date(year, month + 1, 0);
 const today = new Date();
 // Collect all events for the month
 const eventsByDate = [];
 for (let i = 1; i <= lastDay.getDate(); i++) {
 const currentDayDate = new Date(year, month, i);
 const events = getEventsForDate(currentDayDate);
 if (events.length > 0) {
 eventsByDate.push({
 date: currentDayDate,
 day: i,
 events: events,
 isToday: currentDayDate.toDateString() === today.toDateString()
 });
 }
 }
 // Render list items
 if (eventsByDate.length === 0) {
 container.innerHTML = '<div class="calendar-list-empty">No events scheduled for this month.</div>';
 return;
 }
 eventsByDate.forEach(({date, day, events, isToday}) => {
 const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
 const monthName = MONTH_NAMES[month].substring(0, 3);
 events.forEach(ev => {
 const listItem = document.createElement('div');
 listItem.className = `calendar-list-item ${isToday ? 'today' : ''}`;
 listItem.onclick = () => openEvent(
 ev.fullTitle || ev.title,
 ev.desc ? 'Event' : 'Info',
 ev.time || 'All Day',
 ev.loc || 'TBD',
 ev.desc || '',
 ev.color,
 ev.textColor
 );
 const bgColor = ev.color || '#2563eb';
 listItem.innerHTML = `
 <div class="list-item-date">
 <div class="list-item-day">${day}</div>
 <div class="list-item-weekday">${dayName}</div>
 </div>
 <div class="list-item-content">
 <div class="list-item-title">${ev.fullTitle || ev.title}</div>
 <div class="list-item-meta">${ev.time || 'All Day'} ${ev.loc ? '• ' + ev.loc : ''}</div>
 </div>
 <div class="list-item-indicator" style="background: ${bgColor};"></div>
 `;
 container.appendChild(listItem);
 });
 });
 }

 function calculateSeasonStats(targetYear, targetMonth) {
 // Calculate season stats dynamically from start (Sept 25, 2025)
 let practice = 0;
 let game = 0;

 // Iterate from Sept 25, 2025 to End of Target Month
 let iterDate = new Date(2025, 8, 25);
 let endDate = new Date(targetYear, targetMonth + 1, 0);

 while (iterDate <= endDate) {
 const evs = getEventsForDate(iterDate);
 evs.forEach(e => {
 if (e.duration) {
 if (e.type === 'game' || e.type === 'tournament') game += e.duration;
 else practice += e.duration;
 }
 });
 iterDate.setDate(iterDate.getDate() + 1);
 }
 return { practice, game };
 }

 function generateSeasonICS() {
 let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Godspeed//NONSGML v1.0//EN\nCALSCALE:GREGORIAN\nMETHOD:PUBLISH\n";

 // Loop from Dec 1, 2025 to April 30, 2026
 let iterDate = new Date(2025, 11, 1);
 const endDate = new Date(2026, 3, 30); // April 30

 while (iterDate <= endDate) {
 const events = getEventsForDate(iterDate);
 events.forEach(e => {
 // Skip INFO pills, only real events
 if (e.type === 'info') return;

 const dateStr = iterDate.toISOString().replace(/-/g, '').split('T')[0];
 let startTime = '090000'; // Default
 let endTime = '100000';

 // Parse time helper
 if (e.time && e.time.includes(':')) {
 // Very basic parser for 6:00 PM
 try {
 const [timeRange, ampm] = e.time.split('M')[0].split(' '); // simple hack
 // Better: use specific data in config if available.
 // For simplicity, we'll try to guess start time or default
 // 6:00 PM -> 180000
 if (e.time.includes('6:00 PM')) { startTime = '180000'; endTime = '190000'; }
 if (e.time.includes('6:00 PM - 8:00 PM')) { startTime = '180000'; endTime = '200000'; }
 if (e.time.includes('10:00 AM')) { startTime = '100000'; endTime = '110000'; }
 if (e.time.includes('11:00 AM')) { startTime = '110000'; endTime = '120000'; }
 if (e.time.includes('1:00 PM')) { startTime = '130000'; endTime = '140000'; }
 } catch (err) { }
 }

 ics += "BEGIN:VEVENT\n";
 ics += `DTSTART;TZID=America/Denver:${dateStr}T${startTime}\n`;
 ics += `DTEND;TZID=America/Denver:${dateStr}T${endTime}\n`;
 ics += `SUMMARY:${e.fullTitle || e.title}\n`;
 ics += `DESCRIPTION:${e.desc || ''}\n`;
 ics += `LOCATION:${e.loc || 'TBD'}\n`;
 ics += "END:VEVENT\n";
 });
 iterDate.setDate(iterDate.getDate() + 1);
 }

 ics += "END:VCALENDAR";
 return ics;
 }
