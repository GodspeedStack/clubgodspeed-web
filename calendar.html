    <header class="bg-black text-white py-20 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-black uppercase mb-4 tracking-tight">2026 Season Schedule</h1>
        <p class="text-gray-400 max-w-2xl mx-auto">Focus. Preparation. Execution.</p>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-16">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-xs uppercase tracking-wider">
                            <th class="p-6 font-bold">Date</th>
                            <th class="p-6 font-bold">Time</th>
                            <th class="p-6 font-bold">Opponent</th>
                            <th class="p-6 font-bold">Location</th>
                            <th class="p-6 font-bold">Status</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-body" class="divide-y divide-gray-100 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="schedule-data.js"></script>
    <script>
        const tableBody = document.getElementById('schedule-body');

        seasonSchedule.forEach(game => {
            // Determine badge color
            const badgeClass = game.location === 'Home'
                ? 'bg-blue-100 text-blue-800'
                : 'bg-gray-100 text-gray-800';

            const row = `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-6 font-bold text-black">${game.date}</td>
                    <td class="p-6 text-gray-600">${game.time}</td>
                    <td class="p-6 font-bold uppercase tracking-wide">${game.opponent}</td>
                    <td class="p-6">
                        <span class="${badgeClass} px-3 py-1 rounded-full text-xs font-bold uppercase">${game.location}</span>
                    </td>
                    <td class="p-6 text-gray-400 italic">${game.status}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    </script>
