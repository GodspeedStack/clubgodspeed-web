<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODSPEED STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white font-sans antialiased">
    <nav class="navbar dark-nav">
        <div class="logo text-white">GODSPEED<span class="text-blue-500">STORE</span></div>
        <div class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-wide">
            <a href="index.html" class="text-gray-400 hover:text-white">Home</a>
            <a href="training.html" class="text-gray-400 hover:text-white">Training</a>

    <header class="hero-section-dark">
        <div class="hero-bg"></div>
        <div class="hero-overlay-dark"></div>
        <div class="hero-content relative z-10 pl-6 md:pl-20 max-w-4xl">

            <p class="text-gray-300 text-lg mb-8">Official Godspeed performance wear.</p>
