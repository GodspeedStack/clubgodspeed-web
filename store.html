<head>

    <!-- Google Fonts: Inter -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* =====================================================
           THE PRO SHOP - DIGITAL FLAGSHIP DESIGN
           ===================================================== */

        body {
            background: #000000;
            margin: 0;
            padding: 0;
        }

        /* Section A: Immersive Hero */
        .store-hero {
            position: relative;
            height: 70vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .store-hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1546519638-68e109498ffc?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .store-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, transparent, #000000);
            pointer-events: none;
        }

        .store-hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffffff;
            padding: 0 20px;
        }

        .store-hero h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            margin: 0 0 1rem 0;
            text-transform: uppercase;
            line-height: 0.9;
        }

        .store-hero p {
            font-size: 1.2rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .store-hero {
                height: 60vh;
            }

            .store-hero h1 {
                font-size: 2.5rem;
            }

            .store-hero p {
                font-size: 1rem;
            }
        }

        /* Section B: Product Grid (Layered Over Hero) */
        .store-products {
            position: relative;
            z-index: 10;
            margin-top: -6rem;
            /* Negative margin for overlap effect */
            padding: 0 1rem 4rem 1rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2rem;
            }
        }

        @media (min-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Product Card */
        .product-card {
            background: #111111;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #222222;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border-color: #333333;
        }

        .product-image-container {
            position: relative;
            width: 100%;
            padding-bottom: 125%;
            /* 4:5 aspect ratio */
            background: #1a1a1a;
            overflow: hidden;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1rem;
        }

        .product-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 0.5rem 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.3;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0 0 0.75rem 0;
        }

        .product-supplier {
            font-size: 0.7rem;
            font-weight: 600;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 0.75rem 0;
        }

        .quick-add-btn {
            width: 100%;
            padding: 0.75rem;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .quick-add-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .quick-add-btn:active {
            transform: translateY(0);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 4rem 1rem;
            color: #666666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222222;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

    <!-- Section A: Immersive Hero -->
    <section class="store-hero">
        <div class="store-hero-bg"></div>
        <div class="store-hero-overlay"></div>
        <div class="store-hero-content">
            <h1>THE PRO<br>SHOP</h1>
            <p>Official Godspeed Performance Gear</p>
        </div>
    </section>

    <!-- Section B: Product Grid (Layered Over Hero) -->
    <section class="store-products">
        <div id="product-grid" class="product-grid">
            <!-- Products will be injected here -->
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading products...</p>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script>
        // =====================================================
        // THE INVENTORY - HYBRID SUPPLIER MODEL
        // ===================================================== 

        const INVENTORY = [
            {
                id: 1,
                title: "Godspeed Pro Hoodie",
                price: 6500,
                image: "assets/godspeed-hoodie.png",
                supplier: "Fourthwall"
            },
            {
                id: 2,
                title: "Elite Shooter Shirt",
                price: 4500,
                image: "assets/godspeed-tshirt.png",
                supplier: "Fourthwall"
            },
            {
                id: 3,
                title: "Performance Shorts",
                price: 3500,
                image: "assets/godspeed-shorts.png",
                supplier: "Fourthwall"
            },
            {
                id: 4,
                title: "Women's Crop Top",
                price: 2800,
                image: "assets/godspeed-croptop.png",
                supplier: "Fourthwall"
            },
            {
                id: 5,
                title: "Performance Socks",
                price: 1800,
                image: "https://images.unsplash.com/photo-1591191538573-86c477e6fa3a?auto=format&fit=crop&w=800",
                supplier: "Nike"
            },
            {
                id: 6,
                title: "Training Bag",
                price: 8500,
                image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=800",
                supplier: "Nike"
            }
        ];

        // =====================================================
        // RENDER PRODUCTS
        // ===================================================== 

        function renderProducts() {
            const grid = document.getElementById('product-grid');

            const html = INVENTORY.map(product => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${product.image}" 
                             alt="${product.title}" 
                             class="product-image"
                             onerror="this.src='https://images.unsplash.com/photo-1556906781-9a412961c28c?auto=format&fit=crop&w=800'">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <div class="product-price">$${(product.price / 100).toFixed(2)}</div>
                        <div class="product-supplier">Powered by ${product.supplier}</div>
                        <button class="quick-add-btn" onclick="quickAdd(${product.id}, '${product.title}')">
                            Quick Add
                        </button>
                    </div>
                </div>
            `).join('');

            grid.innerHTML = html;
        }

        // =====================================================
        // QUICK ADD FUNCTIONALITY
        // ===================================================== 

        function quickAdd(productId, productTitle) {
            console.log(`✅ Added to cart: ${productTitle} (ID: ${productId})`);

            // Visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Added ✓';
            btn.style.background = '#34c759';
            btn.style.color = '#ffffff';

            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '#ffffff';
                btn.style.color = '#000000';
            }, 1500);

            // Update cart badge
            const cartBadge = document.querySelector('.cart-badge');
            const currentCount = parseInt(cartBadge.textContent) || 0;
            cartBadge.textContent = currentCount + 1;
        }

        // =====================================================
        // INITIALIZE
        // ===================================================== 

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            console.log('🏀 The Pro Shop loaded with', INVENTORY.length, 'products');
        });

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile menu toggle
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                mobileMenuBtn.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
            });
        }
    </script>
    <script src="nav-security.js"></script>
    <script src="src/components/MobileBottomNav.js"></script>
</body>
