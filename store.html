<head>
    <meta charset="UTF-8">

    <!-- Google Fonts: Inter -->

    <style>
        /* =====================================================
           THE PRO SHOP - DIGITAL FLAGSHIP DESIGN
           ===================================================== */

        body {
            background: #000000;
            margin: 0;
            padding: 0;
        }

        /* =====================================================
           CSS COLLAGE HERO - "CONTROLLED CHAOS"
           ===================================================== */

        /* Hero Container */
        .store-hero {
            position: relative;
            height: 80vh;
            width: 100%;
            overflow: hidden;
            background: #000000;
        }

        /* Dark Textured Base */
        .hero-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, #1a1a1a 0%, #000000 70%);
            z-index: 1;
        }

        /* Model Images - Layered Composition */
        .hero-model {
            position: absolute;
            z-index: 2;
        }

        .hero-model img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%) contrast(120%);
            transition: all 0.3s ease;
        }

        /* Model 1: Coach True (Back-Left) */
        .hero-model-1 {
            bottom: 0;
            left: -5%;
            width: 45%;
            height: 85%;
            opacity: 0.7;
            z-index: 2;
        }

        /* Model 2: Lifestyle (Center-Front) */
        .hero-model-2 {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 85%;
            opacity: 0.9;
            z-index: 4;
        }

        /* Typography Layer (Parallax Effect) */
        .hero-typography {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
        }

        .hero-typography h1 {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.85;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.3),
                0 0 80px rgba(0, 0, 0, 0.8);
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.1);
        }

        /* Gradient Overlay for Depth */
        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            z-index: 7;
            pointer-events: none;
        }

        /* Subtitle */
        .hero-subtitle {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8;
            text-align: center;
        }

        .hero-subtitle p {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .store-hero {
                height: 60vh;
            }

            .hero-model-1 {
                width: 60%;
                height: 70%;
                left: -10%;
            }

            .hero-model-2 {
                width: 55%;
                height: 65%;
                right: -5%;
            }

            .hero-model-3 {
                width: 70%;
                height: 60%;
            }

            .hero-typography h1 {
                font-size: clamp(3rem, 15vw, 6rem);
            }

            .hero-subtitle p {
                font-size: 0.75rem;
            }
        }

        /* Section B: Product Grid (Layered Over Hero) */
        .store-products {
            position: relative;
            z-index: 10;
            margin-top: 1rem;
            /* Safe spacing on mobile */
            padding: 0 1rem 4rem 1rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (min-width: 768px) {
            .store-products {
                margin-top: -6rem;
                /* Negative margin overlap on desktop only */
            }
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2rem;
            }
        }

        @media (min-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Product Card */
        .product-card {
            background: #111111;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #222222;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border-color: #333333;
        }

        .product-image-container {
            position: relative;
            width: 100%;
            padding-bottom: 125%;
            /* 4:5 aspect ratio */
            background: #1a1a1a;
            overflow: hidden;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1rem;
        }

        .product-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 0.5rem 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.3;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin: 0 0 0.75rem 0;
        }

        .product-supplier {
            font-size: 0.7rem;
            font-weight: 600;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 0.75rem 0;
        }

        .quick-add-btn {
            width: 100%;
            padding: 0.75rem;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .quick-add-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .quick-add-btn:active {
            transform: translateY(0);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 4rem 1rem;
            color: #666666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222222;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

    <!-- Scripts -->
    <script>
        // =====================================================
        // THE INVENTORY - HYBRID SUPPLIER MODEL
        // ===================================================== 

        const INVENTORY = [
            {
                id: 1,
                title: "Godspeed Pro Hoodie",
                price: 6500,
                image: "/assets/godspeed-hoodie.png",
            },
            {
                id: 2,
                title: "Elite Shooter Shirt",
                price: 4500,
                image: "/assets/godspeed-tshirt.png",
            },
            {
                id: 3,
                title: "Performance Shorts",
                price: 3500,
                image: "/assets/godspeed-shorts.png",
            },
            {
                id: 4,
                title: "Women's Crop Top",
                price: 2800,
                image: "/assets/godspeed-croptop.png",
            },
            {
                id: 5,
                title: "Performance Socks",
                price: 1800,
                image: "/assets/godspeed-socks.png",
            },
            {
                id: 6,
                title: "Training Bag",
                price: 8500,
                image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=800",
            }
        ];

        // =====================================================
        // RENDER PRODUCTS
        // ===================================================== 

        function renderProducts() {
            const grid = document.getElementById('product-grid');

            const html = INVENTORY.map(product => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${product.image}" 
                             alt="${product.title}" 
                             class="product-image"
                             onerror="this.src='https://images.unsplash.com/photo-1556906781-9a412961c28c?auto=format&fit=crop&w=800'">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <div class="product-price">$${(product.price / 100).toFixed(2)}</div>
                        <button class="quick-add-btn" onclick="addToCart(${product.id}, '${product.title}', ${product.price})">
                            Quick Add
                        </button>
                    </div>
                </div>
            `).join('');

            grid.innerHTML = html;
        }

        // =====================================================
        // QUICK ADD FUNCTIONALITY
        // ===================================================== 

        function quickAdd(productId, productTitle) {
            console.log(`✅ Added to cart: ${productTitle} (ID: ${productId})`);

            // Visual feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Added ✓';
            btn.style.background = '#34c759';
            btn.style.color = '#ffffff';

            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '#ffffff';
                btn.style.color = '#000000';
            }, 1500);

            // Update cart badge
            const cartBadge = document.querySelector('.cart-badge');
            const currentCount = parseInt(cartBadge.textContent) || 0;
            cartBadge.textContent = currentCount + 1;
        }

        // =====================================================
        // INITIALIZE
        // ===================================================== 

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            console.log('🏀 The Pro Shop loaded with', INVENTORY.length, 'products');
        });

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Mobile menu toggle
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                mobileMenuBtn.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
            });
        }
    </script>

    <!-- Cart Overlay -->

    <!-- CART LOGIC -->
    <script>
        // =====================================================
        // GODSPEED CART ENGINE - Vanilla JS
        // ===================================================== 

        let cart = [];

        // DOM Elements
        const cartDrawer = document.getElementById('cart-drawer');
        const cartOverlay = document.getElementById('cart-overlay');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalElement = document.getElementById('cart-total');
        const cartBadge = document.querySelector('.cart-badge');
        const closeCartBtn = document.getElementById('close-cart');
        const cartBtn = document.getElementById('cart-btn');
        const checkoutBtn = document.getElementById('checkout-btn');

        // Open Cart
        function openCart() {
            cartDrawer.classList.remove('translate-x-full');
            cartOverlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // Close Cart
        function closeCart() {
            cartDrawer.classList.add('translate-x-full');
            cartOverlay.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Add to Cart
        function addToCart(productId, productTitle, productPrice) {
            // Check if item already exists
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: productId,
                    title: productTitle,
                    price: productPrice,
                    quantity: 1
                });
            }

            updateCart();
            openCart();
        }

        // Remove from Cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Update Cart Display
        function updateCart() {
            // Update badge
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartBadge.textContent = totalItems;

            // Update total
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalElement.textContent = `$${(total / 100).toFixed(2)}`;

            // Render items
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-gray-500 text-sm">Your stash is empty</p>
                    </div>
                `;
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="flex items-start justify-between mb-6 pb-6 border-b border-gray-200">
                        <div class="flex-1">
                            <h3 class="font-bold text-sm mb-2">${item.title}</h3>
                            <p class="text-sm font-mono">$${(item.price / 100).toFixed(2)}</p>
                            <p class="text-xs text-gray-500 mt-1">Qty: ${item.quantity}</p>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-sm font-bold hover:opacity-50 transition-opacity">
                            REMOVE
                        </button>
                    </div>
                `).join('');
            }
        }

        // Event Listeners
        closeCartBtn.addEventListener('click', closeCart);
        cartOverlay.addEventListener('click', closeCart);
        cartBtn.addEventListener('click', openCart);

        checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) {
                alert('Your stash is empty');
                return;
            }
            alert('Checkout coming soon! Total: ' + cartTotalElement.textContent);
        });

        // Update the existing quickAdd function
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
    </script>
